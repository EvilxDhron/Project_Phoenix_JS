<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DiceGame</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Belleza&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Pacifico&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Belleza&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Pacifico&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Roll the Dice</h1>
    </header>
    <main>
      <section class="player1 player">
        <div class="part1">
          <h2>Player 1</h2>
          <h2 id="player1Score">0</h2>
        </div>
        <img src="./Assets/animal.png" alt="" />
        <div class="part2">
          <div class="currentbox">
            <h3>Current</h3>
            <h3 id="player1Current">0</h3>
          </div>
        </div>
      </section>
      <section class="center">
        <button id="newGameBtn">New Game</button>
        <img class="diceImg" src="./Assets/1dice.png" alt="#" />
        <div class="playbtns">
          <button id="rollDiceBtn">Roll Dice</button>
          <button id="holdBtn">Hold</button>
        </div>
      </section>
      <section class="player2 player">
        <div class="part1">
          <h2>Player 2</h2>
          <h2 id="player2Score">0</h2>
        </div>
        <img src="./Assets/stripes.png" alt="" />
        <div class="part2">
          <div class="currentbox">
            <h3>Current</h3>
            <h3 id="player2Current">0</h3>
          </div>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
